services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - tabmonster_uploads:/tmp/tabmonster/uploads

  frontend:
    build: ./frontend
    ports:
      - "4173:4173"
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend

volumes:
  tabmonster_uploads:
